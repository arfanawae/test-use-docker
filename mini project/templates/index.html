<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Guestbook</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, verdana, sans-serif;
            background-color: crimson;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #444;
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            background-color: #2ecc71;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }

        button:hover {
            background-color: #27ae60;
        }

        .comment-box {
            background: #f9f9f9;
            padding: 15px;
            border-left: 5px solid #3498db;
            margin-top: 15px;
            border-radius: 4px;
        }

        .comment-author {
            font-weight: bold;
            color: #2980b9;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📝 Smart Guestbook ของ Arfan</h1>
        <p style="text-align: center; color: #7f8c8d;">ยินดีต้อนรับสู่ระบบสมุดเยี่ยมชมเว็บอัจฉริยะ!</p>

        <!-- ฟอร์มสำหรับกรอกข้อมูล -->
        <form action="/send" method="POST">
            <div class="form-group">
                <label for="name">ชื่อของคุณ:</label>
                <input type="text" id="name" name="name" placeholder="พิมพ์ชื่อของคุณที่นี่..." required>
            </div>
            <div class="form-group">
                <label for="message">ข้อความที่อยากบอก:</label>
                <textarea id="message" name="message" rows="4" placeholder="พิมพ์ความรู้สึกหรือข้อความทักทาย..."
                    required></textarea>
            </div>
            <button type="submit">ส่งข้อความ 🚀</button>
        </form>

        <hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">

        <h2>💬 ข้อความจากผู้เยี่ยมชมล่าสุด</h2>
        {% for entry in entries %}
        <div class="comment-box">
            <span class="comment-author">{{ entry.name }}:</span>
            <p>{{ entry.message }}</p>
        </div>
        {% endfor %}
    </div>
</body>

</html>
